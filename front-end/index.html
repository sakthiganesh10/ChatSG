<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT-SG</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="container" id="container">

    <div class="form-box sign-up">
      <form>
        <h1>Create Account</h1>

        <button type="button" class="google-btn" id="googleSignup">
          <i class="fa-brands fa-google"></i>
          Sign up with Google
        </button>

        <p>Use your Google account to continue</p>
      </form>
    </div>

    <div class="form-box sign-in">
      <form>
        <h1>Sign In</h1>

        <button type="button" class="google-btn" id="googleLogin">
          <i class="fa-brands fa-google"></i>
          Sign in with Google
        </button>

        <p>Welcome back to ChatSG</p>
      </form>
    </div>

    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1>Welcome Back!</h1>
        <p>Already have an account?</p>
        <button id="loginBtn">Sign In</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1>Hello Friend!</h1>
        <p>New here? Start your AI journey</p>
        <button id="registerBtn">Sign Up</button>
      </div>
    </div>

  </div>

  <script src="login.js" type="module"></script>
  <script src="https://kit.fontawesome.com/4ab3f77f9d.js" crossorigin="anonymous"></script>
</body>
</html>
